    <h1>Contact Information</h1> 

   <div style="border: 1px solid #2e5a2e; padding: 25px; font-family: 'Segoe UI', Arial, sans-serif; color: #2e5a2e; width: 600px; background-color: #fcfdfc;">
    <form action="mailto:weldoncheserek@gmail.com" method="post" enctype="text/plain">
        
        <label style="display: block; font-weight: bold; margin-bottom: 2px; font-size: 14px;">Enter your Name:</label>
        <input type="text" name="Name" style="width: 250px; border: 1px solid #777; margin-bottom: 12px; padding: 2px; outline: none;">

        <label style="display: block; font-weight: bold; margin-bottom: 2px; font-size: 14px;">E-mail address*:</label>
        <input type="email" name="Email" required style="width: 250px; border: 1px solid #777; margin-bottom: 12px; padding: 2px; outline: none;">

        <label style="display: block; font-weight: bold; margin-bottom: 2px; font-size: 14px;">Message Subject:</label>
        <input type="text" name="Subject" style="width: 250px; border: 1px solid #777; margin-bottom: 12px; padding: 2px; outline: none;">

        <label style="display: block; font-weight: bold; margin-bottom: 2px; font-size: 14px;">Enter your Message*:</label>
        <textarea name="Message" required style="width: 350px; height: 180px; border: 1px solid #777; margin-bottom: 15px; display: block; resize: none; outline: none; padding: 5px;"></textarea>

        <div style="display: flex; align-items: center; margin-bottom: 15px;">
            <input type="checkbox" id="copy" name="Send_Copy" style="margin: 0 8px 0 0;">
            <label for="copy" style="font-size: 13px; font-weight: bold;">E-mail a copy of this message to your own address.</label>
        </div>

        <button type="submit" style="background-color: #004d00; color: white; border: 1px solid #000; padding: 3px 15px; font-weight: bold; cursor: pointer; font-size: 13px; box-shadow: 1px 1px 2px #888;">Send</button>
    </form>
</div>
