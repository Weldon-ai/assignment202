
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacts - Weldon Cheserek</title>
<style>
    body { font-family: 'Segoe UI', Arial, sans-serif; margin:0; padding:0; background:#fff; color:#004d00; }
    
    h1 { text-align:center; margin-top:20px; }
    hr { border:0; height:1px; background:#004d00; margin:20px 0; }

    /* Contact form container */
    .contact-form {
        max-width:600px;
        margin:20px auto;
        padding:25px;
        border:1px solid #66cc66;
        background-color:#e6ffe6;
        border-radius:5px;
    }

    .contact-form label {
        display:block;
        font-weight:bold;
        margin-bottom:5px;
        font-size:14px;
    }

    .contact-form input,
    .contact-form textarea {
        width:100%;
        padding:6px 8px;
        margin-bottom:15px;
        border:1px solid #77aa77;
        border-radius:3px;
        outline:none;
        font-size:14px;
        box-sizing:border-box;
    }

    .contact-form textarea {
        resize:none;
        height:150px;
    }

    .contact-form .checkbox-container {
        display:flex;
        align-items:center;
        margin-bottom:15px;
    }

    .contact-form .checkbox-container input {
        margin-right:8px;
    }

    .contact-form button {
        background-color:#99ff99;
        color:#004d00;
        border:1px solid #66cc66;
        padding:8px 20px;
        font-weight:bold;
        font-size:14px;
        cursor:pointer;
        border-radius:3px;
    }

    .contact-form button:hover {
        background-color:#88ee88;
    }

    @media screen and (max-width:650px){
        .contact-form { width:90%; padding:15px; }
    }
</style>
</head>
<body>

<!-- Navigation -->
<div class="menu">
    <a href="index.html">Home</a>
    <a href="experience.html">Experience</a>
    <a href="contacts.html">Contacts</a>
    <a href="hobbies.html">Hobbies</a>
</div>

<hr>

<h1>Contact Information</h1>

<!-- Contact Form -->
<div class="contact-form">
    <form action="mailto:weldoncheserek@gmail.com" method="post" enctype="text/plain">
        <label for="name">Enter your Name:</label>
        <input type="text" name="Name" id="name">

        <label for="email">E-mail address*:</label>
        <input type="email" name="Email" id="email" required>

        <label for="subject">Message Subject:</label>
        <input type="text" name="Subject" id="subject">

        <label for="message">Enter your Message*:</label>
        <textarea name="Message" id="message" required></textarea>

        <div class="checkbox-container">
            <input type="checkbox" id="copy" name="Send_Copy">
            <label for="copy">E-mail a copy of this message to your own address.</label>
        </div>

        <button type="submit">email me</button>
    </form>
</div>

</body>
</html>
